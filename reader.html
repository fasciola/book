<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read Online — Spare Some Minutes of Your Time</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="multilingual-reader.css">
  <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body data-script="latin">
  <nav>
    <div class="logo-container"><a href="index.html" class="logo" aria-label="Back to language selection"><span class="logo-text">Spare Some Minutes</span></a></div>
    <div class="menu-icon" onclick="toggleMenu()" aria-label="Toggle Menu"><i class="fas fa-bars"></i></div>
    <div class="nav-links" id="navLinks"><a href="index.html">All languages</a><a href="#source-book">Read online</a><a href="download.html">Downloads</a><span class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode"><i class="fas fa-moon" id="themeIcon"></i></span></div>
  </nav>
  <main class="container">
    <header style="text-align:center;margin-bottom:3rem;"><h1 class="book-title" id="readerTitle">Read Online</h1><div style="text-align:center;"><span class="sub-title" id="readerSubtitle">Spare Some Minutes of Your Time</span></div></header>
    <div class="translated-reader-layout"><aside class="translated-reader-sidebar"><h3 id="readerContents">Contents</h3><div class="toc"><a href="#source-book" id="readerLink">Read the book</a></div></aside><section class="translated-reader-main" id="source-book"><p class="reader-loading" id="reader-status"><i class="fas fa-spinner fa-spin"></i><span id="readerLoading">Loading…</span></p></section></div>
  </main>
  <script>
    const editions = {
      fr: { title: 'Message à ceux qui qui cherchent la vérité', subtitle: 'La terre est la patrie de tous', contents: 'Table des matières', action: 'Lire le livre…', script: 'latin', lang: 'fr' },
      de: { title: 'Massage für allen Suchenden der Wahrheit', subtitle: 'Die Erde ist die Heimat aller Geschöpfen', contents: 'Inhalt', action: 'Das Buch lesen…', script: 'latin', lang: 'de' },
      ru: { title: 'Русское издание', subtitle: 'Spare Some Minutes of Your Time', contents: 'Содержание', action: 'Читать книгу…', script: 'cyrillic', lang: 'ru' },
      zh: { title: '中文版本', subtitle: 'Spare Some Minutes of Your Time', contents: '目录', action: '阅读本书…', script: 'cjk', lang: 'zh-CN' },
      nl: { title: 'Nederlandse editie', subtitle: 'Spare Some Minutes of Your Time', contents: 'Inhoud', action: 'Lees het boek…', script: 'latin', lang: 'nl' },
      sw: { title: 'Toleo la Kiswahili', subtitle: 'Spare Some Minutes of Your Time', contents: 'Yaliyomo', action: 'Soma kitabu…', script: 'latin', lang: 'sw' }
    };
    const code = new URLSearchParams(location.search).get('lang');
    const edition = editions[code];
    if (!edition) location.replace('index.html');
    document.documentElement.lang = edition.lang;
    document.body.dataset.script = edition.script;
    document.title = `${edition.title} — Spare Some Minutes of Your Time`;
    document.getElementById('readerTitle').textContent = edition.title;
    document.getElementById('readerSubtitle').textContent = edition.subtitle;
    document.getElementById('readerContents').textContent = edition.contents;
    document.getElementById('readerLink').textContent = edition.action;
    document.getElementById('readerLoading').textContent = edition.action;
    window.BOOK_READER_CONFIG = { code, errorText: 'Unable to load this edition. Please refresh the page.' };
  </script>
  <script src="global.js"></script>
  <script type="module" src="reader-loader.js"></script>
</body>
</html>
