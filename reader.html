<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read Online — Spare Some Minutes of Your Time</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="multilingual-reader.css">
  <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body data-script="latin">
  <nav>
    <div class="logo-container"><a href="index.html" class="logo"><span class="logo-text">Spare Some Minutes</span></a></div>
    <div class="menu-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="nav-links" id="navLinks"><a href="index.html">Languages</a><span class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></span></div>
  </nav>
  <main class="container">
    <header style="text-align:center;margin-bottom:3rem;"><h1 class="book-title" id="readerTitle">Read Online</h1><div style="text-align:center;"><span class="sub-title">Spare Some Minutes of Your Time</span></div></header>
    <div class="translated-reader-layout"><aside class="translated-reader-sidebar"><h3>Contents</h3><div class="toc"><a href="#source-book">Read the book</a></div></aside><section class="translated-reader-main" id="source-book"><p class="reader-loading" id="reader-status"><i class="fas fa-spinner fa-spin"></i><span>Loading…</span></p></section></div>
  </main>
  <script>
    const allowed = new Set(['nl','sw']);
    const code = new URLSearchParams(location.search).get('lang');
    if (!allowed.has(code)) location.replace('index.html');
    window.BOOK_READER_CONFIG = { code, errorText: 'Unable to load this edition. Please refresh the page.' };
    const labels = { nl: 'Nederlandse editie', sw: 'Toleo la Kiswahili' };
    document.getElementById('readerTitle').textContent = labels[code] || 'Read Online';
  </script>
  <script src="global.js"></script>
  <script src="reader-loader.js"></script>
</body>
</html>
