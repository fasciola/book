<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读中文版 — Spare Some Minutes of Your Time</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="language-portal.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body class="reader-page">
  <nav>
  <div class="logo-container"><a href="index.html" class="logo"><img src="logo-black.png" alt="Spare Some Minutes Logo" class="nav-logo nav-logo-black" onerror="this.style.display='none';"><img src="logo-white.png" alt="Spare Some Minutes Logo" class="nav-logo nav-logo-white" onerror="this.style.display='none';"><span class="logo-text">Spare Some Minutes</span></a></div>
  <div class="menu-icon" onclick="toggleMenu()" aria-label="Toggle Menu"><i class="fas fa-bars"></i></div>
  <div class="nav-links" id="navLinks"><a href="index.html">选择其他语言</a><span class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode"><i class="fas fa-moon" id="themeIcon"></i></span></div>
</nav>
  <main class="reader-main">
    <header class="reader-heading"><h1>阅读中文版</h1><p>本版本直接显示源文档，以保留原文、注释及原始格式。</p></header>
    <div class="reader-actions">
      <a class="btn btn-outline-primary" href="index-zh.html"><i class="fas fa-arrow-left"></i> 选择其他语言</a>
      <a class="btn" id="downloadSource" href="#"><i class="fas fa-file-word"></i> 下载原始文档</a>
    </div>
    <p class="reader-fallback" id="readerStatus" aria-live="polite">Loading the book…</p>
    <iframe class="reader-frame" id="bookReader" title="中文 book reader" allowfullscreen loading="eager"></iframe>
    <p class="reader-fallback">If the reader does not load in your browser, use the original document download above.</p>
  </main>
  <footer><p>&copy; 2026 Ahmad Attijani Ahmad Albadawi.</p></footer>
  <script>window.BOOK_READER_CONFIG = { code: 'zh', loadingText: 'Loading the book…' };</script>
  <script src="global.js"></script>
  <script src="source-reader.js"></script>
</body>
</html>
